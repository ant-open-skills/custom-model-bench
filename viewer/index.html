<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>custom-model-bench · viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="light" data-density="comfortable">

<nav class="nav">
  <div class="nav-inner">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 20 20" width="20" height="20" fill="none">
          <rect x="1" y="1" width="18" height="18" rx="4" fill="none" stroke="currentColor" stroke-width="1.4"/>
          <path d="M5 14 L10 6 L15 14" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
          <line x1="7" y1="11" x2="13" y2="11" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </span>
      custom-model-bench
      <span class="sub">· viewer</span>
    </div>

    <div class="nav-tabs" id="tabs">
      <a data-route="compare" class="active"><span class="tab-num">01</span> Compare</a>
      <a data-route="detail"><span class="tab-num">02</span> Run detail</a>
      <a data-route="drill"><span class="tab-num">03</span> Drill-down</a>
      <a data-route="spec"><span class="tab-num">04</span> Spec</a>
    </div>

    <div class="nav-right">
      <button id="tweaksBtn" class="btn ghost" title="Toggle tweaks">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="4" cy="4" r="1.2" fill="currentColor"/>
          <circle cx="10" cy="7" r="1.2" fill="currentColor"/>
          <circle cx="4" cy="10" r="1.2" fill="currentColor"/>
          <line x1="4" y1="5.2" x2="4" y2="8.8" stroke="currentColor" stroke-width="1"/>
          <line x1="10" y1="8.2" x2="10" y2="12" stroke="currentColor" stroke-width="1"/>
          <line x1="10" y1="2" x2="10" y2="5.8" stroke="currentColor" stroke-width="1"/>
          <line x1="4" y1="2" x2="4" y2="2.8" stroke="currentColor" stroke-width="1"/>
          <line x1="4" y1="11.2" x2="4" y2="12" stroke="currentColor" stroke-width="1"/>
        </svg>
        Tweaks
      </button>
      <button id="runBtn" class="btn">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
          <path d="M3 2 L10 6 L3 10 Z"/>
        </svg>
        Run again
      </button>
    </div>
  </div>
</nav>

<main id="main" role="main"></main>

<!-- Tweaks panel -->
<aside class="tweaks-panel" id="tweaks" aria-label="Visual tweaks">
  <h5>Tweaks</h5>

  <div class="tweak-row">
    <label>Theme</label>
    <div class="seg" data-seg="theme">
      <button data-val="light">Paper</button>
      <button data-val="dark">Ink</button>
    </div>
  </div>

  <div class="tweak-row">
    <label>Density</label>
    <div class="seg" data-seg="density">
      <button data-val="comfortable">Comfortable</button>
      <button data-val="compact">Compact</button>
    </div>
  </div>

  <div class="tweak-row">
    <label>Distribution viz</label>
    <div class="seg" data-seg="distViz">
      <button data-val="box">Box</button>
      <button data-val="strip">Strip</button>
      <button data-val="hist">Hist</button>
    </div>
  </div>

  <div class="tweak-row" style="margin-bottom:0;">
    <label>Hero metric</label>
    <div class="seg" data-seg="heroMetric">
      <button data-val="all">All</button>
      <button data-val="p50">Speed</button>
      <button data-val="cost">Cost</button>
      <button data-val="success">Reliability</button>
    </div>
  </div>
</aside>

<script src="data.js"></script>
<script src="charts.js"></script>
<script src="screens.js"></script>
<script src="app.js"></script>

</body>
</html>
